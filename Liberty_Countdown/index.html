<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liberty Countdown</title>

    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">

    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
    <link rel="manifest" href="site.webmanifest">
    
    <meta name="theme-color" content="#b22234">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Liberty Countdown">
</head>

<body>

    <div class="container">
        <h1>🇺🇸 Liberty Countdown</h1>
        <h2>Countdown to July 4, 2026</h2>



        <div class="toggle-container">
            <label class="switch">
                <input type="checkbox" id="flipToggle" checked>
                <span class="slider"></span>
            </label>
            <span class="toggle-label">Flip Animation</span>
        </div>
        <div id="countdown-boxes">
            <div class="time-box">
                <span id="days">0</span>
                <label>Days</label>
            </div>
            <div class="time-box">
                <span id="hours">0</span>
                <label>Hours</label>
            </div>
            <div class="time-box">
                <span id="minutes">0</span>
                <label>Minutes</label>
            </div>
            <div class="time-box">
                <span id="seconds">0</span>
                <label>Seconds</label>
            </div>
        </div>
        <div class="fact-box">
            <h2>On This Day in U.S. History</h2>
            <p id="daily-fact">Loading fact...</p>
        </div>
        <div id="map-section">
            <h3>Explore the United States</h3>
        
            <div id="us-map"></div>
        
            <div id="state-info">
                Click a state to learn something!
            </div>
        </div>
    </div>

<canvas id="fireworks"></canvas>

<<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="https://unpkg.com/topojson@3"></script>
<script src="script.js"></script>
</body>
</html>
